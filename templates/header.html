<div class="header">
  <h1>
    <a href="{% url 'todo:todo_list' %}" style="text-decoration:none; color:inherit;">
      Todo 서비스
    </a>
  </h1>

  <div>
    <!-- ✅ [삭제됨] 기존: Django 템플릿 인증 분기(request.user.is_authenticated) -->
    <!--
    {% if request.user.is_authenticated %}
        <span>{{ request.user.username }}님 환영합니다</span>
        <button id="logoutBtn">로그아웃</button>
    {% else %}
        <a href="/login/">로그인</a>
        <a href="/signup-page/">회원가입</a>
    {% endif %}
    -->

    <!-- ✅ [수정됨] 변경: JWT 기준으로 "JS가 토글"할 영역을 미리 만들어둠 -->
    <!-- ✅ JWT 기준: JS로 토글할 영역 -->
    <span id="authWelcome" style="display:none;"></span>
    <!-- ✅ [추가됨] 환영/상태 표시 -->

    <button id="logoutBtn" style="display:none;">로그아웃</button>
    <!-- ✅ [수정됨] 기본 숨김 처리(display:none) -->


    <!-- ✅ [추가됨] 로그인/회원가입 링크도 JS로 토글 -->
    <a id="loginLink" href="/login/" style="display:none;">로그인</a>
    <a id="signupLink" href="/signup-page/" style="display:none;">회원가입</a>
  </div>
</div>

<hr>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // ✅ [추가됨] 토큰 키 상수화 (다른 페이지들과 통일)
  const ACCESS_KEY = "access_token";
  const REFRESH_KEY = "refresh_token";
  const USERNAME_KEY = "username";

  // ✅ [수정됨] 기존에는 logoutBtn만 찾아서 있으면 클릭 이벤트만 붙였음
  // const btn = document.getElementById("logoutBtn");
  // ❌ [삭제됨] 아래에서 logoutBtn으로 다시 받음


  // ✅ [추가됨] 현재 access 토큰 존재 여부로 로그인 상태 판단
  const access = localStorage.getItem(ACCESS_KEY);

  // ✅ [추가됨] 토글 대상 DOM 요소들
  const welcomeEl = document.getElementById("authWelcome");
  const logoutBtn = document.getElementById("logoutBtn");
  const loginLink = document.getElementById("loginLink");
  const signupLink = document.getElementById("signupLink");

  // ✅ [삭제됨] 기존: logoutBtn이 없으면 return (이제는 loginLink 등도 다루므로 단순 return 제거)
  // const btn = document.getElementById("logoutBtn");
  // if (!btn) return;

  // ✅ [추가됨] 토큰 있으면: 로그아웃/환영 표시 + 로그인/회원가입 숨김
  if (access) {
  // ======================================================
  // 기존 코드 삭제
  // ------------------------------------------------------
  // 단순히 "로그인됨"이라고 표시하던 부분을 제거
  // 이제는 실제 로그인한 사용자 정보를 API로 가져와서
  // username을 화면에 표시하도록 변경
  // ======================================================
  // welcomeEl.textContent = "로그인됨";



  // ======================================================
  // 로그인한 사용자 정보 가져오기
  // ------------------------------------------------------
  // /me/ API를 호출하여 현재 로그인한 사용자 정보를 조회
  // (MeAPIView에서 id, username, email을 반환)
  // ======================================================
  try {

    // 서버에 사용자 정보 요청
    const res = await window.api.get("/me/");

    // 응답 데이터에서 사용자 정보 추출
    const user = res.data;

    // 화면에 "username님 환영합니다" 메시지 표시
    // 예: "hong님 환영합니다"
    welcomeEl.textContent = `${user.username}님 환영합니다`;
    welcomeEl.style.display = "inline-block";
    logoutBtn.style.display = "inline-block";
    loginLink.style.display = "none";
    signupLink.style.display = "none";

    // ✅ [추가됨] todo_list.js에서 현재 사용자 판별용으로 username 저장
    localStorage.setItem(USERNAME_KEY, user.username);

  } catch (err) {

    // ======================================================
    // 사용자 정보 조회 실패 처리
    // ------------------------------------------------------
    // 토큰이 만료되었거나 인증 오류가 발생했을 가능성
    // ======================================================

    // 콘솔에 오류 출력 (디버깅용)
    console.error("유저 정보 불러오기 실패", err);

    // 로컬스토리지에 저장된 토큰 제거
    // → 인증 상태 초기화
    localStorage.removeItem(ACCESS_KEY);
    localStorage.removeItem(REFRESH_KEY);
    localStorage.removeItem(USERNAME_KEY);

    // 로그인 페이지로 이동
    window.location.href = "/login/";

    return;
  }
  } else {
    // ✅ [추가됨] 토큰 없으면: 로그인/회원가입 표시 + 로그아웃/환영 숨김
    welcomeEl.style.display = "none";
    logoutBtn.style.display = "none";

    loginLink.style.display = "inline-block";
    signupLink.style.display = "inline-block";
  }

  // ✅ [추가됨] 로그아웃 버튼 클릭 처리
  logoutBtn.addEventListener("click", async () => {
    try {
      await window.api.post("/api/logout/");
    } catch (err) {
      console.error("로그아웃 실패", err.response?.data || err.message);
    } finally {
      localStorage.removeItem(ACCESS_KEY);
      localStorage.removeItem(REFRESH_KEY);
      localStorage.removeItem(USERNAME_KEY);
      window.location.href = "/login/";
    }
  });
});
</script>
