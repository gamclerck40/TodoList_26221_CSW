{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container">
  <h2>Create a New Todo</h2>
    <div>
      <label for="name">Name:</label>
      <input type="text" name="name" id="name">
    </div>

    <div>
      <label for="description">Description:</label>
      <textarea name="description" id="description">
      </textarea>
    </div>

    <div>
      <label for="complete">Complete:</label>
      <input type="checkbox" name="complete" id="complete">
    </div>

    <div>
      <label for="exp">Experience Points:</label>
      <input type="number" name="exp" id="exp" min="0">
    </div>

    <button type="submit" id="todoCreate">Create</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<!-- axios 라이브러리 CDN 로드 (HTTP 요청을 쉽게 보내기 위한 라이브러리) -->

<script>
/* ✅ ADDED: axios 인스턴스(api) 생성 (create.html에는 기존에 없어서 "api is not defined" 발생) */
const api = axios.create({
  baseURL: "/",
  headers: {
    "Content-Type": "application/json"
  }
  // axios 인스턴스 생성 (모든 API 요청의 기본 URL 설정)
});

/* ✅ ADDED: CSRF 토큰 자동 추가 (Django 보안 필수) */
api.interceptors.request.use(config => {

  const csrfToken = document.cookie
    .split("; ")
    .find(row => row.startsWith("csrftoken="))
    ?.split("=")[1];
  // 브라우저 쿠키에서 csrftoken 값을 찾아서 추출

  if (csrfToken) {
    config.headers["X-CSRFToken"] = csrfToken;
    // Django에서 요구하는 CSRF 토큰을 요청 헤더에 추가
  }

  config.headers["X-Requested-With"] = "XMLHttpRequest";
  // Django에서 AJAX 요청임을 명확히 해주는 헤더(권장)

  return config;
  // 수정된 요청 설정 반환
});

// id가 "todoCreate"인 버튼 클릭 이벤트 등록
document.getElementById("todoCreate").addEventListener("click", async () => {

  try {

    // Todo 생성 API 호출 (POST 요청)
    // 기존 API 주소(todo/api/create/) 대신 ViewSet API 주소로 변경
    const res = await api.post("/todo/viewsets/view/", {

      name: document.getElementById("name").value,
      // id="name" 입력칸의 값을 가져와 Todo의 name 필드로 전달

      description: document.getElementById("description").value,
      // id="description" 입력칸의 값을 가져와 description 필드로 전달

      complete: document.getElementById("complete").checked,
      // 체크박스 상태(true / false)를 complete 값으로 전달

      exp: Number(document.getElementById("exp").value || 0)
      // exp 입력값을 숫자로 변환
      // 값이 비어 있으면 0으로 처리
    });

    console.log(res.data);
    // 서버에서 생성된 Todo 데이터 확인

    window.location.href = "/todo/list/";
    // List 목록으로 리다이렉트.

  } catch (err) {

    console.error(err.response?.data || err.message);
    // 요청 중 오류 발생 시 콘솔에 에러 출력

  }

});
</script>

{% endblock %}
